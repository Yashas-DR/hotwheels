# ── Telegram ───────────────────────────────────────────────────
# Get a bot token from @BotFather on Telegram.
# Get your chat ID from @userinfobot or @getidsbot.
telegram:
  bot_token: "8638938359:AAFjH1QDYv4Sxm2_X7G4m3jdsqsZu9aNqYo"
  chat_id: "991748023"
  enabled: true

# ── Search ─────────────────────────────────────────────────────
# Blinkit search queries to run each cycle.
# Keep this small — every extra query adds requests.
search:
  queries:
    - "hot wheels"
  max_pages: 4            # Max pagination pages per query (12 products/page)

